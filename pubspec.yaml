name: pothole_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.0.0

  # Location
  geolocator: ^14.0.2

  # Camera
  camera: ^0.12.0+1

  # Map
  flutter_map: ^8.2.2
  latlong2: ^0.9.0

  # Image processing
  image: ^4.1.3

  # UUID
  uuid: ^4.2.1

  # HTTP
  http: ^1.1.0

  # ENV
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env